<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57F17"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- ConditionService (top) -->
  <rect x="300" y="15" width="260" height="70" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="2"/>
  <text x="430" y="38" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold">ConditionService</text>
  <text x="430" y="56" text-anchor="middle" fill="#555" font-size="11">責務: 条件値の提供</text>
  <text x="430" y="72" text-anchor="middle" fill="#BF360C" font-size="11">conditionA / conditionB を返す</text>

  <!-- Page (container, layout only) -->
  <rect x="240" y="125" width="380" height="75" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="430" y="148" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">ScreenPage（親）</text>
  <text x="430" y="166" text-anchor="middle" fill="#555" font-size="11">責務: コンポーネントを並べるだけ</text>
  <text x="430" y="186" text-anchor="middle" fill="#1565C0" font-size="11">props の受け渡しなし / ロジックなし</text>

  <!-- Page does NOT connect to ConditionService -->
  <!-- Just show it as independent -->

  <!-- Feature Components (bottom) -->
  <!-- TitleFeature -->
  <rect x="30" y="290" width="240" height="155" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="150" y="312" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">TitleComponent</text>
  <text x="150" y="330" text-anchor="middle" fill="#555" font-size="11">責務: タイトル自己完結</text>
  <rect x="50" y="339" width="200" height="24" rx="4" fill="#C8E6C9"/>
  <text x="150" y="355" text-anchor="middle" fill="#1B5E20" font-size="11">useCondition() → conditionA 取得</text>
  <rect x="50" y="370" width="200" height="24" rx="4" fill="#A5D6A7"/>
  <text x="150" y="386" text-anchor="middle" fill="#1B5E20" font-size="11">conditionA → タイトルA / B 表示</text>
  <rect x="50" y="401" width="200" height="24" rx="4" fill="#81C784"/>
  <text x="150" y="416" text-anchor="middle" fill="#1B5E20" font-size="10">テスト: useCondition をモック</text>

  <!-- ButtonFeature -->
  <rect x="310" y="290" width="240" height="180" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="430" y="312" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">ButtonComponent</text>
  <text x="430" y="330" text-anchor="middle" fill="#555" font-size="11">責務: ボタン自己完結</text>
  <rect x="330" y="339" width="200" height="24" rx="4" fill="#C8E6C9"/>
  <text x="430" y="355" text-anchor="middle" fill="#1B5E20" font-size="11">useCondition() → conditionA/B 取得</text>
  <rect x="330" y="370" width="200" height="24" rx="4" fill="#A5D6A7"/>
  <text x="430" y="386" text-anchor="middle" fill="#1B5E20" font-size="11">conditionA → 活性 / 非活性</text>
  <rect x="330" y="401" width="200" height="24" rx="4" fill="#A5D6A7"/>
  <text x="430" y="417" text-anchor="middle" fill="#1B5E20" font-size="11">conditionB → A / B 画面遷移</text>
  <rect x="330" y="432" width="200" height="24" rx="4" fill="#81C784"/>
  <text x="430" y="447" text-anchor="middle" fill="#1B5E20" font-size="10">テスト: useCondition をモック</text>

  <!-- ModalFeature -->
  <rect x="590" y="290" width="240" height="155" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <text x="710" y="312" text-anchor="middle" fill="#6A1B9A" font-size="12" font-weight="bold">ModalComponent</text>
  <text x="710" y="330" text-anchor="middle" fill="#555" font-size="11">責務: モーダル自己完結</text>
  <rect x="610" y="339" width="200" height="24" rx="4" fill="#E1BEE7"/>
  <text x="710" y="355" text-anchor="middle" fill="#4A148C" font-size="11">onMounted 時に自ら表示</text>
  <rect x="610" y="370" width="200" height="24" rx="4" fill="#CE93D8"/>
  <text x="710" y="386" text-anchor="middle" fill="#4A148C" font-size="11">表示ロジックを内包</text>
  <rect x="610" y="401" width="200" height="24" rx="4" fill="#BA68C8"/>
  <text x="710" y="416" text-anchor="middle" fill="#4A148C" font-size="10">テスト: onMounted のユニットテスト</text>

  <!-- ConditionService → TitleComponent (useCondition) -->
  <path d="M340,85 C200,85 150,200 150,288" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-o)"/>
  <text x="190" y="185" text-anchor="middle" fill="#E65100" font-size="10">useCondition()</text>

  <!-- ConditionService → ButtonComponent (useCondition) -->
  <path d="M430,85 V288" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-o)"/>
  <text x="455" y="195" fill="#E65100" font-size="10">useCondition()</text>

  <!-- Page → each component (uses / layout) -->
  <path d="M340,200 L150,288" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <path d="M430,200 V288" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <path d="M520,200 L710,288" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <text x="310" y="254" text-anchor="middle" fill="#1565C0" font-size="10">配置のみ（props なし）</text>

  <!-- Legend -->
  <rect x="30" y="470" width="800" height="38" rx="6" fill="#FAFAFA" stroke="#ddd"/>
  <line x1="50" y1="489" x2="100" y2="489" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="108" y="493" fill="#555" font-size="11">配置（props なし）</text>
  <line x1="270" y1="489" x2="320" y2="489" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <text x="328" y="493" fill="#E65100" font-size="11">useCondition()（各コンポーネントが内部取得）</text>
  <rect x="610" y="481" width="14" height="14" rx="2" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="630" y="493" fill="#555" font-size="11">Feature Component</text>
  <rect x="745" y="481" width="14" height="14" rx="2" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="765" y="493" fill="#555" font-size="11">Page</text>
</svg>
