<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <!-- Unit (bottom, green) -->
  <polygon points="157,268 543,268 640,390 60,390" fill="#4CAF50"/>
  <!-- Integration (middle, orange) -->
  <polygon points="253,147 447,147 543,268 157,268" fill="#FF9800"/>
  <!-- E2E (top, red) -->
  <polygon points="350,25 447,147 253,147" fill="#F44336"/>

  <!-- White dividers -->
  <line x1="253" y1="147" x2="447" y2="147" stroke="white" stroke-width="2"/>
  <line x1="157" y1="268" x2="543" y2="268" stroke="white" stroke-width="2"/>

  <!-- E2E text -->
  <text x="350" y="95" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="15">E2E テスト</text>
  <text x="350" y="113" text-anchor="middle" fill="#ffcdd2" font-family="sans-serif" font-size="11">遅い ・ 保守コスト高 ・ テスト数少</text>

  <!-- Integration text -->
  <text x="350" y="204" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="17">統合テスト</text>
  <text x="350" y="224" text-anchor="middle" fill="#fff3e0" font-family="sans-serif" font-size="12">中程度 ・ 保守コスト中 ・ テスト数中</text>

  <!-- Unit text -->
  <text x="350" y="325" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="19">ユニットテスト</text>
  <text x="350" y="349" text-anchor="middle" fill="#e8f5e9" font-family="sans-serif" font-size="13">速い ・ 保守コスト低 ・ テスト数多</text>

  <!-- Left arrow: テスト数 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>
  <text x="28" y="50" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="11" font-weight="bold">テスト数</text>
  <text x="28" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">少ない</text>
  <line x1="28" y1="72" x2="28" y2="378" stroke="#ccc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="28" y="400" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">多い</text>

  <!-- Right arrow: 実行速度 -->
  <text x="672" y="50" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="11" font-weight="bold">実行速度</text>
  <text x="672" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">遅い</text>
  <line x1="672" y1="72" x2="672" y2="378" stroke="#ccc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="672" y="400" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">速い</text>
</svg>
