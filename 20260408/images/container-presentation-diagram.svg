<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57F17"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- ConditionService (top) -->
  <rect x="300" y="15" width="260" height="70" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="2"/>
  <text x="430" y="38" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold">ConditionService</text>
  <text x="430" y="56" text-anchor="middle" fill="#555" font-size="11">責務: 条件値の提供</text>
  <text x="430" y="72" text-anchor="middle" fill="#BF360C" font-size="11">conditionA / conditionB を返す</text>

  <!-- Container -->
  <rect x="240" y="125" width="380" height="110" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="430" y="148" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">ScreenContainer</text>
  <text x="430" y="166" text-anchor="middle" fill="#555" font-size="11">責務: データ取得・状態管理・ロジック</text>
  <rect x="260" y="174" width="160" height="24" rx="4" fill="#BBDEFB"/>
  <text x="340" y="190" text-anchor="middle" fill="#0D47A1" font-size="11">conditionA を取得・保持</text>
  <rect x="430" y="174" width="170" height="24" rx="4" fill="#BBDEFB"/>
  <text x="515" y="190" text-anchor="middle" fill="#0D47A1" font-size="11">conditionB を取得・保持</text>
  <text x="430" y="225" text-anchor="middle" fill="#555" font-size="11">→ 各 Presentation に props として渡す</text>

  <!-- ConditionService → Container -->
  <path d="M430,85 V123" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-o)"/>
  <text x="455" y="108" fill="#E65100" font-size="10">useCondition()</text>

  <!-- Presentation (bottom, 3 components) -->
  <!-- TitlePresentation -->
  <rect x="30" y="310" width="220" height="110" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="140" y="331" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">TitlePresentation</text>
  <text x="140" y="349" text-anchor="middle" fill="#555" font-size="11">責務: タイトルの描画のみ</text>
  <rect x="50" y="358" width="180" height="24" rx="4" fill="#C8E6C9"/>
  <text x="140" y="374" text-anchor="middle" fill="#1B5E20" font-size="11">props: conditionA</text>
  <rect x="50" y="389" width="180" height="24" rx="4" fill="#A5D6A7"/>
  <text x="140" y="405" text-anchor="middle" fill="#1B5E20" font-size="11">conditionA → タイトルA / B 表示</text>

  <!-- ButtonPresentation -->
  <rect x="320" y="310" width="220" height="130" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="430" y="331" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">ButtonPresentation</text>
  <text x="430" y="349" text-anchor="middle" fill="#555" font-size="11">責務: ボタンの描画のみ</text>
  <rect x="340" y="358" width="180" height="24" rx="4" fill="#C8E6C9"/>
  <text x="430" y="374" text-anchor="middle" fill="#1B5E20" font-size="11">props: conditionA, conditionB</text>
  <rect x="340" y="389" width="180" height="24" rx="4" fill="#A5D6A7"/>
  <text x="430" y="405" text-anchor="middle" fill="#1B5E20" font-size="11">conditionA → 活性 / 非活性</text>
  <rect x="340" y="420" width="180" height="24" rx="4" fill="#A5D6A7"/>
  <text x="430" y="436" text-anchor="middle" fill="#1B5E20" font-size="11">conditionB → A / B 画面遷移</text>

  <!-- ModalPresentation -->
  <rect x="610" y="310" width="220" height="110" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="720" y="331" text-anchor="middle" fill="#6A1B9A" font-size="12" font-weight="bold">ModalPresentation</text>
  <text x="720" y="349" text-anchor="middle" fill="#555" font-size="11">責務: モーダルの描画のみ</text>
  <rect x="630" y="358" width="180" height="24" rx="4" fill="#E1BEE7"/>
  <text x="720" y="374" text-anchor="middle" fill="#4A148C" font-size="11">props: isVisible</text>
  <rect x="630" y="389" width="180" height="24" rx="4" fill="#CE93D8"/>
  <text x="720" y="405" text-anchor="middle" fill="#4A148C" font-size="11">isVisible → モーダル表示 / 非表示</text>

  <!-- Container → TitlePresentation -->
  <path d="M330,235 L140,308" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <text x="210" y="270" text-anchor="middle" fill="#1565C0" font-size="10">props</text>

  <!-- Container → ButtonPresentation -->
  <path d="M430,235 V308" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <text x="450" y="275" fill="#1565C0" font-size="10">props</text>

  <!-- Container → ModalPresentation -->
  <path d="M530,235 L720,308" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <text x="650" y="270" text-anchor="middle" fill="#1565C0" font-size="10">props</text>

  <!-- Legend -->
  <rect x="30" y="462" width="800" height="40" rx="6" fill="#FAFAFA" stroke="#ddd"/>
  <line x1="50" y1="482" x2="100" y2="482" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="108" y="486" fill="#555" font-size="11">props（データを渡す）</text>
  <line x1="280" y1="482" x2="330" y2="482" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <text x="338" y="486" fill="#E65100" font-size="11">useCondition()（Container のみ取得）</text>
  <rect x="600" y="474" width="14" height="14" rx="2" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="620" y="485" fill="#555" font-size="11">Presentation</text>
  <rect x="710" y="474" width="14" height="14" rx="2" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="730" y="485" fill="#555" font-size="11">Container</text>
</svg>
